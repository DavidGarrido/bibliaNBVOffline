<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,'Times New Roman',serif">
  <defs>
    <clipPath id="gc">
      <ellipse cx="250" cy="160" rx="195" ry="128"/>
    </clipPath>
  </defs>

  <!-- Líneas de cuadrícula del globo (recortadas al óvalo) -->
  <g clip-path="url(#gc)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none">
    <!-- Líneas horizontales (latitudes) -->
    <line x1="50" y1="105" x2="450" y2="105"/>
    <line x1="50" y1="133" x2="450" y2="133"/>
    <line x1="50" y1="160" x2="450" y2="160"/>
    <line x1="50" y1="187" x2="450" y2="187"/>
    <line x1="50" y1="215" x2="450" y2="215"/>
    <!-- Elipses verticales (longitudes) -->
    <ellipse cx="250" cy="160" rx="45"  ry="128"/>
    <ellipse cx="250" cy="160" rx="92"  ry="128"/>
    <ellipse cx="250" cy="160" rx="140" ry="128"/>
    <ellipse cx="250" cy="160" rx="195" ry="128"/>
  </g>

  <!-- Continentes simplificados -->
  <g clip-path="url(#gc)" fill="rgba(180,228,252,0.32)" stroke="rgba(180,228,252,0.45)" stroke-width="0.8">
    <!-- Norteamérica -->
    <ellipse cx="118" cy="135" rx="34" ry="44" transform="rotate(-18 118 135)"/>
    <!-- Sudamérica -->
    <ellipse cx="138" cy="183" rx="16" ry="28" transform="rotate(12 138 183)"/>
    <!-- Europa -->
    <ellipse cx="222" cy="122" rx="14" ry="16"/>
    <!-- África -->
    <ellipse cx="228" cy="163" rx="20" ry="34"/>
    <!-- Asia -->
    <ellipse cx="322" cy="128" rx="52" ry="30" transform="rotate(-8 322 128)"/>
    <!-- Oceanía -->
    <ellipse cx="360" cy="185" rx="20" ry="13"/>
  </g>

  <!-- Borde exterior del globo -->
  <ellipse cx="250" cy="160" rx="195" ry="128" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Letras ID centradas en el globo -->
  <text x="250" y="198" text-anchor="middle" fill="white" font-size="118" font-weight="bold" letter-spacing="-4">ID</text>

  <!-- Textos de la iglesia -->
  <text x="250" y="328" text-anchor="middle" fill="white" font-size="24" font-style="italic">Iglesia Cristiana</text>
  <text x="250" y="380" text-anchor="middle" fill="white" font-size="42" font-style="italic" textLength="440" lengthAdjust="spacing">Reflexiones Bíblicas</text>
  <text x="250" y="432" text-anchor="middle" fill="white" font-size="34" font-style="italic">I.D.S.D.</text>
</svg>
