<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblia NBV Offline</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="splash">
        <img src="logo_iglesia.jpg" alt="Iglesia Cristiana Reflexiones Bíblicas I.D.S.D.">
    </div>
    <div id="app">
        <header>
            <div style="display:flex;align-items:baseline;justify-content:center;gap:6px">
                <h1 id="app-title" style="margin:0">Biblia</h1>
                <span id="app-version" style="font-size:11px;opacity:0.35"></span>
            </div>
            <select id="translation-select"></select>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar libro o pasaje (ej: Juan 3:16)">
            </div>
        </header>

        <main id="content">
            <div id="loader">Cargando Biblia...</div>
            <div id="view-books" class="view">
                <ul id="books-list"></ul>
            </div>
            <div id="view-chapters" class="view" style="display:none">
                <div class="view-header">
                    <button class="back-btn">⬅ Libros</button>
                    <h2 id="current-book-name"></h2>
                </div>
                <div id="chapters-grid"></div>
            </div>
            <div id="view-reader" class="view" style="display:none">
                <div class="reader-nav">
                    <button class="back-btn" title="Volver a Capítulos">⬅ Cap.</button>
                    <h2 id="reader-title"></h2>
                    <select id="reader-translation-select" class="reader-version-select"></select>
                    <button id="mode-btn" class="icon-btn" title="Cambiar modo de lectura"></button>
                    <button id="home-btn" class="icon-btn">📚</button>
                </div>
                <div id="verses-content"></div>
                <div class="chapter-navigation">
                    <button id="prev-chap" class="nav-btn">⬅ Anterior</button>
                    <button id="next-chap" class="nav-btn">Siguiente ➡</button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registrado', reg);
                }).catch(err => {
                    console.log('SW error', err);
                });
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
