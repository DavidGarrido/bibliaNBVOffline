<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblia NBV Offline</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="splash">
        <img src="logo_iglesia.svg" alt="Iglesia Cristiana Reflexiones Bíblicas I.D.S.D.">
    </div>
    <div id="app">
        <!-- Barra superior universal -->
        <nav id="top-bar">
            <div class="tb-row">
                <div class="tb-left">
                    <button id="studies-btn" class="icon-btn" title="Estudios">☰</button>
                    <button id="tb-back" class="icon-btn tb-hidden">⬅</button>
                </div>
                <div class="tb-center">
                    <span id="tb-title">Biblia</span>
                    <span id="app-version" style="font-size:11px;opacity:0.35"></span>
                </div>
                <div class="tb-right">
                    <select id="translation-select" class="reader-version-select"></select>
                    <button id="qs-open-btn" class="icon-btn" title="Búsqueda rápida (/)">🔍</button>
                </div>
            </div>
            <div id="study-nav-bar" class="snb-hidden">
                <button id="snb-prev" class="snb-arrow">‹</button>
                <div id="snb-center">
                    <span id="snb-ref"></span>
                    <span id="snb-pos"></span>
                </div>
                <button id="snb-next" class="snb-arrow">›</button>
            </div>
        </nav>

        <main id="content">
            <div id="loader">Cargando Biblia...</div>
            <div id="view-books" class="view">
                <ul id="books-list"></ul>
            </div>
            <div id="view-chapters" class="view" style="display:none">
                <div id="chapters-grid"></div>
            </div>
            <div id="view-reader" class="view" style="display:none">
                <div id="verses-content"></div>
                <div class="chapter-navigation">
                    <button id="prev-chap" class="nav-btn">⬅ Anterior</button>
                    <button id="next-chap" class="nav-btn">Siguiente ➡</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal búsqueda rápida -->
    <div id="quick-search" class="qs-hidden">
        <div id="qs-overlay"></div>
        <div id="qs-box">
            <div id="qs-input-wrap">
                <span class="qs-icon">🔍</span>
                <input id="qs-input" type="text" placeholder="Juan 3:16 · Sal 23 · Génesis" autocomplete="off" spellcheck="false">
                <span id="qs-esc">esc</span>
            </div>
            <div id="qs-results"></div>
            <div id="qs-hint">Escribe el libro, capítulo y/o versículo</div>
        </div>
    </div>

    <!-- Barra de acciones del versículo seleccionado -->
    <div id="verse-actions" class="va-hidden">
        <span id="va-ref"></span>
        <div class="va-buttons">
            <button id="va-save" class="va-btn" title="Guardar en estudio">🔖 Guardar</button>
            <button id="va-compare" class="va-btn" title="Ver en todas las versiones">⚖️ Comparar</button>
        </div>
    </div>

    <!-- Modal comparación de versículo -->
    <div id="verse-compare" class="vc-hidden">
        <div id="vc-overlay"></div>
        <div id="vc-box">
            <div id="vc-header">
                <span id="vc-title"></span>
                <button id="vc-close" class="icon-btn">✕</button>
            </div>
            <div id="vc-content"></div>
        </div>
    </div>

    <!-- Drawer lateral de estudios -->
    <div id="studies-drawer" class="sd-closed">
        <div id="sd-overlay"></div>
        <div id="sd-panel">
            <div id="sd-header">
                <span class="sd-header-name">General</span>
                <span class="sd-header-sub">Estudio activo</span>
            </div>
            <div class="sd-divider"></div>
            <button id="sd-new-note">📝 Nueva nota</button>
            <button id="sd-new-study">➕ Nuevo estudio</button>
            <div class="sd-divider"></div>
            <div class="sd-section-label">Mis estudios</div>
            <ul id="sd-studies-list"></ul>
            <div class="sd-divider"></div>
            <div class="sd-section-label">⚙️ Configuración</div>
            <button id="sd-mode-toggle">📄 Modo: Páginas</button>
            <button id="sd-study-alert-toggle">🔔 Advertir estudio al iniciar</button>
            <button id="sd-refs-toggle">🔖 Referencias: Estudio activo</button>
            <button id="sd-nav-toggle">🧭 Navegación por estudio: Inactiva</button>
        </div>
    </div>

    <!-- Bottom sheet de estudio (timeline) -->
    <div id="study-sheet" class="ss-hidden">
        <div id="ss-overlay"></div>
        <div id="ss-box">
            <div id="ss-header">
                <span id="ss-title"></span>
                <button id="ss-close" class="icon-btn">✕</button>
            </div>
            <div id="ss-content"></div>
            <div id="ss-actions"></div>
        </div>
    </div>

    <!-- Bottom sheet nueva nota / guardar versículo -->
    <div id="note-sheet" class="ns-hidden">
        <div id="ns-overlay"></div>
        <div id="ns-box">
            <div id="ns-header">
                <span id="ns-title">Nueva nota</span>
                <button id="ns-close" class="icon-btn">✕</button>
            </div>
            <div id="ns-content">
                <div id="ns-verse-ref" class="ns-verse-ref"></div>
                <div id="ns-verse-text" class="ns-verse-text"></div>
                <textarea id="ns-note-input" placeholder="Escribe una nota (opcional)"></textarea>
            </div>
            <div id="ns-actions">
                <button id="ns-save-btn" class="primary-btn">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Toast de confirmación -->
    <div id="save-toast" class="st-hidden">Guardado ✓</div>

    <!-- Modal expandido de navegación por estudio -->
    <div id="study-nav-modal" class="snm-hidden">
        <div id="snm-overlay"></div>
        <div id="snm-box">
            <div id="snm-header">
                <button id="snm-prev" class="snm-arrow icon-btn">‹</button>
                <span id="snm-pos"></span>
                <button id="snm-next" class="snm-arrow icon-btn">›</button>
                <button id="snm-close" class="icon-btn">✕</button>
            </div>
            <div id="snm-content"></div>
        </div>
    </div>

    <!-- Modal nota de estudio (badge) -->
    <div id="note-badge-modal" class="nbm-hidden">
        <div id="nbm-overlay"></div>
        <div id="nbm-box">
            <div id="nbm-header">
                <span id="nbm-ref"></span>
                <button id="nbm-close" class="icon-btn">✕</button>
            </div>
            <div id="nbm-note-text"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registrado', reg);
                }).catch(err => {
                    console.log('SW error', err);
                });
            });
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
